version: '3.8'

services:
  self-learning-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: self-learning-ai
    ports:
      - "5000:5000"
    environment:
      - LEARNING_ALGO=${LEARNING_ALGO:-markov}
      - AUTO_TRAIN=${AUTO_TRAIN:-true}
      - TRAINING_INTERVAL=${TRAINING_INTERVAL:-6}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - FLASK_DEBUG=false
    volumes:
      - ../data:/app/data
    restart: unless-stopped

networks:
  default:
    name: self-learning-network
